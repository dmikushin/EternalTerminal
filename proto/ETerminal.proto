syntax = "proto2";
package et;
option optimize_for = LITE_RUNTIME;

import "ET.proto";

enum TerminalPacketType {
  KEEP_ALIVE = 0;
  TERMINAL_BUFFER = 1;
  TERMINAL_INFO = 2;
  PORT_FORWARD_DESTINATION_REQUEST = 5;
  PORT_FORWARD_DESTINATION_RESPONSE = 6;
  PORT_FORWARD_DATA = 7;
  TERMINAL_USER_INFO = 8;
  TERMINAL_INIT = 9;
  JUMPHOST_INIT = 10;
  // Client asks the server to bring up a new reverse-forward source at
  // runtime (the `~C -R bind:port:host:hp` escape command). The payload
  // is a PortForwardSourceRequest, identical in shape to the entries in
  // InitialPayload.reversetunnels.
  ADD_REVERSE_FORWARD_REQUEST = 11;
  // Server's reply for the most recent ADD_REVERSE_FORWARD_REQUEST.
  // The payload is a PortForwardSourceResponse — actual_port set on
  // success (including the OS-assigned port for port=0 requests),
  // error set on failure.
  ADD_REVERSE_FORWARD_RESPONSE = 12;
}

message TerminalBuffer {
  optional bytes buffer = 1;
}

message TerminalInfo {
  optional string id = 1;
  optional int32 row = 2;
  optional int32 column = 3;
  optional int32 width = 4;
  optional int32 height = 5;
}

message PortForwardSourceRequest {
  optional SocketEndpoint source = 1;
  optional SocketEndpoint destination = 2;
  optional string environmentvariable = 3;
}

message PortForwardSourceResponse {
  optional string error = 1;
  // For sources whose request specified port=0 (or omitted the port for
  // a UNIX socket), this is the OS-assigned port the listener actually
  // bound to. Unset when the request specified a fixed port. Mirrors
  // OpenSSH's behavior of reporting the dynamic port allocation.
  optional int32 actual_port = 2;
}

message PortForwardDestinationRequest {
  optional SocketEndpoint destination = 1;
  optional int32 fd = 2;
}

message PortForwardDestinationResponse {
  optional int32 clientfd = 1;
  optional int32 socketid = 2;
  optional string error = 3;
}

message PortForwardData {
  optional bool sourcetodestination = 1;
  optional int32 socketid = 2;
  optional bytes buffer = 3;
  optional string error = 4;
  optional bool closed = 5;
}

message InitialPayload {
  optional bool jumphost = 1 [default = false];
  repeated PortForwardSourceRequest reversetunnels = 2;
  map<string, string> environmentvariables = 3;
}

message InitialResponse {
  optional string error = 1;
  // One PortForwardSourceResponse per element of
  // InitialPayload.reversetunnels, in the same order. Lets the client
  // surface the OS-assigned port to the user when the reverse-forward
  // request used port=0.
  repeated PortForwardSourceResponse reversetunnel_responses = 2;
}

message ConfigParams {
  optional int32 vlevel = 1;
  optional int32 minloglevel = 2;
}

message TermInit {
  repeated string environmentnames = 1;
  repeated string environmentvalues = 2;
}

message TerminalUserInfo {
  optional string id = 1;
  optional string passkey = 2;
  optional int64 uid = 3;
  optional int64 gid = 4;
  optional int64 fd = 5;
}